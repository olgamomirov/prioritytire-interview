query CategoryDetail($filters: CategoryFilterInput) {
  categories(filters: $filters) {
    items {
      name
      meta_title
      meta_description
      description
      products {
        items {
          url_key
          name
          price_range {
            minimum_price {
              regular_price {
                value
                currency
              }
              final_price {
                value
                currency
              }
            }
          }
          thumbnail {
            label
            url
          }
        }
      }
    }
  }
}
